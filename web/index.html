<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>kbdlayout viewer</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <label>
          Model
          <select id="model-select"></select>
        </label>
        <label>
          Keymap
          <select id="keymap-select"></select>
        </label>
        <span id="lock-sequences" aria-label="Lock modifier sequences"></span>
      </header>

      <section class="viewer" aria-label="Keyboard model">
        <div id="keyboard"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
